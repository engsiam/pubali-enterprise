<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Central circle with gradient -->
  <circle cx="256" cy="200" r="120" fill="url(#accentGrad)" opacity="0.9"/>
  
  <!-- Anchor/Ship icon -->
  <g transform="translate(256, 180)">
    <!-- Anchor ring -->
    <circle cx="0" cy="-25" r="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Anchor shaft -->
    <line x1="0" y1="-13" x2="0" y2="35" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Anchor flukes (bottom curved part) -->
    <path d="M -22 40 Q -22 55 0 60 Q 22 55 22 40" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center point -->
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>
  
  <!-- Brand Name -->
  <text x="256" y="370" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    PUBALI
  </text>
  
  <!-- Enterprise text -->
  <text x="256" y="420" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="600" fill="#2563eb" text-anchor="middle" letter-spacing="0.5">
    ENTERPRISE
  </text>
  
  <!-- Decorative line -->
  <line x1="120" y1="435" x2="392" y2="435" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
</svg>